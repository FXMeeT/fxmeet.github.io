<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Picsum Image Grid</title>
    <style>
        body {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: 150px;
            gap: 2px;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <script>
        function createImageGrid() {
            document.body.innerHTML = ''; // Clear existing content
            const totalImages = Math.ceil(window.innerWidth / 150) * Math.ceil(window.innerHeight / 150);
            for (let i = 0; i < totalImages; i++) {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'image';
                imgDiv.style.backgroundImage = `url('https://picsum.photos/150?random=${i + Math.random()}')`;
                document.body.appendChild(imgDiv);
            }
        }createImageGrid();
    window.addEventListener('resize', createImageGrid);
</script>

</body>
</html>
